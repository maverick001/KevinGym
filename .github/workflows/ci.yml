name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Set up Node.js
          uses: actions/setup-node@v2
          with:
              node-version: '14'

        - name: Install dependencies
          run: npm install --prefix backend

        - name: Run tests
          run: npm test --prefix backend

    deploy:
        needs: build
        runs-on: self-hosted
        if: github.event_name == 'push'

        steps:
        - name: Deploy
          run: |
              cd ~/kevingym
              git pull origin main
              npm run install-all
              npm run build --prefix frontend
              pm2 restart kevingym
